name: Deploy (reusable)

# Reusable deployment: provision durable infra (Terraform), apply D1 migrations,
# and deploy the Worker (Wrangler) for a given environment. Called by
# deploy-staging.yml (push → main) and deploy-production.yml (release published).
#
# The only input is `environment` (staging | production); every other value
# (wrangler env key, D1 name, tfvars, TF backend) is derived from it.

on:
  workflow_call:
    inputs:
      environment:
        description: Target environment — "staging" or "production"
        required: true
        type: string
    secrets:
      CLOUDFLARE_API_TOKEN:
        required: true
      CLOUDFLARE_ACCOUNT_ID:
        required: true
      AWS_ACCESS_KEY_ID:
        required: true
      AWS_SECRET_ACCESS_KEY:
        required: true

jobs:
  test:
    name: Backend gate (typecheck + tests)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
      - run: corepack enable && corepack prepare pnpm@9 --activate
      - run: pnpm install --frozen-lockfile
      - run: pnpm nx run-many -t typecheck test --projects=tag:language:typescript

  deploy:
    name: Deploy → ${{ inputs.environment }}
    needs: test
    runs-on: ubuntu-latest
    # Binds to the GitHub Environment — add required reviewers there to gate
    # production behind a manual approval.
    environment: ${{ inputs.environment }}
    # Everything else is derived from `environment` (staging | production).
    env:
      WRANGLER_ENV: "${{ inputs.environment }}"
      D1_DATABASE: "igt-${{ inputs.environment == 'production' && 'prod' || 'staging' }}"
      TFVARS: "${{ inputs.environment }}.tfvars"
      TF_BACKEND: "backend.${{ inputs.environment }}.hcl"
    steps:
      - name: Validate environment
        run: |
          if [ "$WRANGLER_ENV" != "staging" ] && [ "$WRANGLER_ENV" != "production" ]; then
            echo "::error::environment must be 'staging' or 'production' (got '$WRANGLER_ENV')."
            exit 1
          fi

      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
      - run: corepack enable && corepack prepare pnpm@9 --activate
      - run: pnpm install --frozen-lockfile

      # Build the Flutter web client and stage it under apps/api/public/app so
      # the Worker serves it (same origin) at /app. API base is the relative
      # /api on that origin.
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - name: Build web client
        working-directory: apps/mobile
        run: |
          flutter create . --platforms=web --project-name caretaker_app
          flutter pub get
          flutter build web --base-href /app/ --dart-define=API_BASE_URL=/api
      - name: Stage web assets
        run: |
          rm -rf apps/api/public/app
          mkdir -p apps/api/public
          cp -r apps/mobile/build/web apps/api/public/app
      - name: Verify web assets were built
        run: |
          if [ ! -f apps/api/public/app/index.html ]; then
            echo "::error::Web assets missing: apps/api/public/app/index.html not found." \
                 "The 'Build web client' / 'Stage web assets' step produced no output —" \
                 "the Worker would deploy without the web app. Failing early."
            exit 1
          fi
          echo "Staged $(find apps/api/public/app -type f | wc -l) web asset file(s)."

      - uses: hashicorp/setup-terraform@v3
      - name: Terraform apply (${{ inputs.environment }} infra)
        working-directory: infra/terraform
        env:
          TF_VAR_cloudflare_api_token: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          TF_VAR_cloudflare_account_id: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        run: |
          terraform init -backend-config="$TF_BACKEND"
          terraform apply -auto-approve -var-file="$TFVARS"

      - name: Apply D1 migrations + deploy Worker
        working-directory: apps/api
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          pnpm wrangler d1 migrations apply "$D1_DATABASE" --env "$WRANGLER_ENV" --remote
          pnpm wrangler deploy --env "$WRANGLER_ENV"
