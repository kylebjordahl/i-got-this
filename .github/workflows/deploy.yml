name: Deploy (reusable)

# Reusable deployment: provision durable infra (Terraform), apply D1 migrations,
# and deploy the Worker (Wrangler) for a given environment. Called by
# deploy-staging.yml (push → main) and deploy-production.yml (release published).

on:
  workflow_call:
    inputs:
      environment:
        description: GitHub Environment name (staging | production)
        required: true
        type: string
      wrangler_env:
        description: wrangler.jsonc env key (staging | production)
        required: true
        type: string
      d1_database:
        description: D1 database name (igt-staging | igt-prod)
        required: true
        type: string
      tfvars:
        description: Terraform var-file (staging.tfvars | production.tfvars)
        required: true
        type: string
      tf_backend:
        description: Terraform backend config (backend.staging.hcl | backend.production.hcl)
        required: true
        type: string
    secrets:
      CLOUDFLARE_API_TOKEN:
        required: true
      CLOUDFLARE_ACCOUNT_ID:
        required: true

jobs:
  test:
    name: Backend gate (typecheck + tests)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
      - run: corepack enable && corepack prepare pnpm@9 --activate
      - run: pnpm install --frozen-lockfile
      - run: pnpm nx run-many -t typecheck test --projects=tag:language:typescript

  deploy:
    name: Deploy → ${{ inputs.environment }}
    needs: test
    runs-on: ubuntu-latest
    # Binds to the GitHub Environment — add required reviewers there to gate
    # production behind a manual approval.
    environment: ${{ inputs.environment }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
      - run: corepack enable && corepack prepare pnpm@9 --activate
      - run: pnpm install --frozen-lockfile

      - uses: hashicorp/setup-terraform@v3
      - name: Terraform apply (${{ inputs.environment }} infra)
        working-directory: infra/terraform
        env:
          TF_VAR_cloudflare_api_token: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          TF_VAR_cloudflare_account_id: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          terraform init -backend-config=${{ inputs.tf_backend }}
          terraform apply -auto-approve -var-file=${{ inputs.tfvars }}

      - name: Apply D1 migrations + deploy Worker
        working-directory: apps/api
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          pnpm wrangler d1 migrations apply ${{ inputs.d1_database }} --env ${{ inputs.wrangler_env }} --remote
          pnpm wrangler deploy --env ${{ inputs.wrangler_env }}
