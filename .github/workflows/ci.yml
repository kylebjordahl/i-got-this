name: CI

on:
  push:
    branches: [main]
    # Docs-only pushes to main don't change the Worker or the web client, so skip
    # CI. Because the staging deploy is gated on CI (workflow_run), skipping CI
    # also skips the redundant staging deploy for a docs edit. PRs are left
    # unfiltered so their checks always report (never a stuck "expected" check).
    paths-ignore:
      - "**/*.md"
      - "docs/**"
      - "LICENSE"
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CI: "true"

jobs:
  backend:
    name: Backend (typecheck + tests)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/pnpm-install
      - name: Typecheck
        run: pnpm nx run-many -t typecheck --projects=tag:language:typescript
      # Integration tests run inside workerd via @cloudflare/vitest-pool-workers
      # (real D1/KV/Queue bindings) — no live Cloudflare account needed.
      - name: Unit + integration tests
        run: pnpm nx run-many -t test --projects=tag:language:typescript

  flutter:
    name: Flutter (analyze + test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/pnpm-install
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          # Cache the Flutter SDK between runs (the download is the slow part).
          cache: true
      # Generate platform runners (ios/, web/) which aren't committed.
      - run: flutter create . --platforms=ios,web --project-name caretaker_app
        working-directory: apps/mobile
      # Drive Flutter through Nx with the `ci` configuration (plain `flutter`,
      # no fvm), selected abstractly by language tag.
      - run: pnpm nx run-many -t pub-get analyze test --configuration=ci --projects=tag:language:dart
