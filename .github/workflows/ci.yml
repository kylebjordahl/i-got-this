name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CI: "true"

jobs:
  backend:
    name: Backend (typecheck + tests)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
      - name: Enable pnpm
        run: corepack enable && corepack prepare pnpm@9 --activate
      - run: pnpm install --frozen-lockfile
      - name: Typecheck
        run: pnpm nx run-many -t typecheck --projects=tag:language:typescript
      # Integration tests run inside workerd via @cloudflare/vitest-pool-workers
      # (real D1/KV/Queue bindings) — no live Cloudflare account needed.
      - name: Unit + integration tests
        run: pnpm nx run-many -t test --projects=tag:language:typescript

  flutter:
    name: Flutter (analyze + test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
      - run: corepack enable && corepack prepare pnpm@9 --activate
      - run: pnpm install --frozen-lockfile
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      # Generate platform runners (ios/, web/) which aren't committed.
      - run: flutter create . --platforms=ios,web --project-name caretaker_app
        working-directory: apps/mobile
      # Drive Flutter through Nx with the `ci` configuration (plain `flutter`,
      # no fvm), selected abstractly by language tag.
      - run: pnpm nx run-many -t pub-get analyze test --configuration=ci --projects=tag:language:dart
