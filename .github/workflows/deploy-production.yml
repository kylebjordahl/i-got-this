name: Deploy production

# Deploys to PRODUCTION when a GitHub Release is published. Tag the release off
# main after staging looks good. Add required reviewers to the `production`
# GitHub Environment to gate this behind a manual approval.
on:
  release:
    types: [published]

concurrency:
  group: deploy-production
  cancel-in-progress: false

permissions:
  contents: read
  actions: read

jobs:
  # Safety net: a release should only be cut off a commit that already went green
  # through CI and staging, but enforce it here too so a hand-cut / mis-targeted
  # release can't push an unvalidated commit to production. (Longer term we should
  # also block cutting the release itself.)
  verify:
    name: Require CI + staging green for ${{ github.sha }}
    runs-on: ubuntu-latest
    steps:
      - name: Verify required workflows succeeded for this commit
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          # github.sha on a release event is the tagged commit. CI runs on push to
          # main (head_sha = that commit); the staging deploy is a workflow_run off
          # CI, so it inherits the same head_sha — both are keyed by ${SHA}.
          for wf in ci.yml deploy-staging.yml; do
            count=$(gh api \
              "repos/${REPO}/actions/workflows/${wf}/runs?head_sha=${SHA}&status=success" \
              --jq '.total_count')
            if [ "${count:-0}" -eq 0 ]; then
              echo "::error::No successful '${wf}' run found for ${SHA}." \
                   "Refusing to deploy to production — ensure CI and the staging" \
                   "deploy both passed on this commit before publishing a release."
              exit 1
            fi
            echo "✓ ${wf} has a successful run for ${SHA}"
          done

  production:
    needs: verify
    uses: ./.github/workflows/deploy.yml
    with:
      environment: production
    secrets:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
