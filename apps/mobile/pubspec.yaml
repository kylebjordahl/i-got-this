name: caretaker_app
description: Caretaker Calendar Platform — family logistics planner (iOS + web).
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ">=3.5.0 <4.0.0"
  flutter: ">=3.24.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  # API access + state management (used as screens are built out in Phase 5).
  dio: ^5.7.0
  flutter_riverpod: ^2.6.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
